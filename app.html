<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlipIt — Get Your Deal Rescue Plan</title>
<meta name="description" content="Enter your competitive deal situation and get an AI-powered rescue plan in 60 seconds." />
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#080808;--surface:#111111;--surface2:#181818;--border:#222222;--border2:#2e2e2e;--text:#f0f0f0;--muted:#777777;--muted2:#444444;--red:#e5484d;--red-dim:#c03a3e;--red-bg:#180a0a;--red-border:#2e1010;--green:#30a46c;--green-bg:#0a1a10;--amber:#e5a00d;--amber-bg:#1a1200}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:56px;background:rgba(8,8,8,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nl{display:flex;align-items:center;gap:8px}
.nm{width:28px;height:28px;border-radius:7px;background:var(--red);display:flex;align-items:center;justify-content:center}
.nn{font-size:16px;font-weight:600;letter-spacing:-0.3px}
.nt{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--surface2);border:1px solid var(--border2);color:var(--muted);font-family:'DM Mono',monospace}
.nb{padding:7px 16px;border-radius:7px;background:transparent;border:1px solid var(--border2);color:var(--muted);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none}
.nb:hover{color:var(--text);border-color:var(--border)}
.page{max-width:720px;margin:0 auto;padding:90px 1.5rem 4rem}
.page-hdr{text-align:center;margin-bottom:2.5rem}
.page-hdr h1{font-size:clamp(26px,4vw,36px);font-weight:600;letter-spacing:-1px;margin-bottom:8px}
.page-hdr p{font-size:15px;color:var(--muted)}
.industries{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-bottom:2rem}
.ind-tag{font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);font-family:'DM Mono',monospace}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem;margin-bottom:1.5rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;color:var(--muted);font-weight:500}
.field input,.field select,.field textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 13px;outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#3a3a3a}
.field select{appearance:none;cursor:pointer}
.field textarea{resize:vertical;min-height:72px}
.rl{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:8px}
.rw{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.rtag{padding:7px 13px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.rtag:hover{border-color:#3a3a3a;color:var(--text)}
.rtag.on{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.cta-btn{width:100%;padding:14px;background:var(--red);border:none;border-radius:9px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}
.cta-btn:hover{background:var(--red-dim)}
.cta-btn:disabled{opacity:.45;cursor:not-allowed}
.err{font-size:13px;color:var(--red);background:var(--red-bg);border:1px solid var(--red-border);border-radius:8px;padding:10px 13px;margin-bottom:12px}
.out-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.sl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:14px;font-family:'DM Mono',monospace}
.arow{display:flex;align-items:flex-start;gap:1.5rem;margin-bottom:4px}
.wp{font-size:52px;font-weight:600;line-height:1;letter-spacing:-3px}
.wb{font-size:12px;color:var(--muted);margin-top:3px}
.ubadge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 10px;border-radius:5px;margin-bottom:8px;font-family:'DM Mono',monospace}
.uh{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}
.um{background:var(--amber-bg);border:1px solid #2e2000;color:var(--amber)}
.ul{background:var(--green-bg);border:1px solid #0a2a14;color:var(--green)}
.at{font-size:14px;color:var(--muted);line-height:1.7}
.kcard{background:var(--red-bg);border:1px solid var(--red-border);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.kl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-bottom:10px;font-family:'DM Mono',monospace}
.kt{font-size:16px;font-weight:500;line-height:1.65;font-style:italic}
.mv{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--border)}
.mv:last-child{border-bottom:none;padding-bottom:0}
.mv:first-child{padding-top:0}
.mvn{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--muted);flex-shrink:0;margin-top:1px;font-family:'DM Mono',monospace}
.mvb{flex:1;min-width:0}
.mvh{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.mvt{font-size:14px;font-weight:600}
.mvtime{font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:2px 9px;border-radius:4px;white-space:nowrap;font-family:'DM Mono',monospace}
.mva{font-size:13px;color:var(--muted);line-height:1.65}
.ttop{background:var(--surface2);border-radius:9px;border-left:3px solid var(--border2);padding:11px 14px;font-size:14px;line-height:1.7;margin-bottom:14px}
.ttsub{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px;font-family:'DM Mono',monospace}
.kmsg{display:flex;gap:9px;font-size:14px;line-height:1.6;margin-bottom:9px}
.ck{color:var(--green);flex-shrink:0;margin-top:3px;font-size:13px}
.obi{margin-bottom:11px}
.obq{font-size:12px;color:var(--amber);font-style:italic;margin-bottom:5px;padding-left:10px;border-left:2px solid var(--amber)}
.oba{font-size:13px;color:var(--muted);line-height:1.65}
.ew{background:var(--surface2);border-radius:10px;padding:14px 16px}
.em{font-size:12px;color:var(--muted2);margin-bottom:4px;font-family:'DM Mono',monospace}
.es{font-size:14px;font-weight:600;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:12px}
.eb{font-size:13px;color:var(--muted);line-height:1.8;white-space:pre-line}
.act-row{display:flex;gap:10px;margin-top:1rem;flex-wrap:wrap}
.abt{flex:1;min-width:120px;padding:10px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;text-align:center}
.abt:hover{border-color:#3a3a3a;color:var(--text)}
.abt.ok{color:var(--green);border-color:var(--green)}
.abt.share-btn{background:var(--surface2);border-color:#1e1e3a;color:#6366f1}
.abt.share-btn:hover{background:#0f0f1a;border-color:#6366f1}
.share-result{display:none;margin-top:10px;background:#0f0f1a;border:1px solid #1e1e3a;border-radius:8px;padding:10px 14px;align-items:center;gap:10px;flex-wrap:wrap}
.share-result.visible{display:flex}
.share-url-text{flex:1;font-size:12px;color:#6366f1;font-family:'DM Mono',monospace;word-break:break-all}
.copy-link-btn{padding:5px 12px;border-radius:6px;background:var(--surface);border:1px solid #1e1e3a;color:#6366f1;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s}
.copy-link-btn:hover{border-color:#6366f1}
.copy-link-btn.ok{color:var(--green);border-color:var(--green)}
@media(max-width:600px){nav{padding:0 1rem}.grid2{grid-template-columns:1fr}.form-card{padding:1.25rem}.arow{flex-direction:column;gap:8px}.act-row{flex-direction:column}.page{padding:80px 1rem 3rem}}
</style>
</head>
<body>
<nav>
  <a href="/" class="nl" style="text-decoration:none">
    <div class="nm"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5L12.5 11.5H1.5L7 1.5Z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/></svg></div>
    <span class="nn">FlipIt</span>
    <span class="nt">beta</span>
  </a>
  <a href="/pricing" class="nb">Pricing</a>
</nav>

<div class="page">
  <div class="page-hdr">
    <h1>Get your deal rescue plan</h1>
    <p>Fill in your situation — your plan is ready in 60 seconds</p>
  </div>
  <div class="industries">
    <span class="ind-tag">HR Tech</span><span class="ind-tag">CRM</span><span class="ind-tag">ITSM</span>
    <span class="ind-tag">Cyber Insurance</span><span class="ind-tag">Marketing Automation</span>
    <span class="ind-tag">Cloud / Infra</span><span class="ind-tag">Any B2B vertical</span>
  </div>
  <div class="form-card">
    <div class="grid2">
      <div class="field"><label>Your product *</label><input type="text" id="product" placeholder="Your product or solution" autocomplete="off"/></div>
      <div class="field"><label>Competitor *</label><input type="text" id="competitor" placeholder="Competitor name" autocomplete="off"/></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Your product / SKU <span style="font-weight:400;color:var(--muted2)">(optional)</span></label><input type="text" id="your_sku" placeholder="e.g. Enterprise plan" autocomplete="off"/></div>
      <div class="field"><label>Competitor SKU <span style="font-weight:400;color:var(--muted2)">(optional)</span></label><input type="text" id="comp_sku" placeholder="e.g. Basic module" autocomplete="off"/></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Deal stage *</label>
        <select id="stage">
          <option value="">Select stage</option>
          <option>Qualification</option><option>Discovery</option><option>Demo / Evaluation</option>
          <option>Proposal</option><option>Negotiation</option><option>Final Decision</option>
        </select>
      </div>
      <div class="field"><label>Industry</label><input type="text" id="industry" placeholder="e.g. SaaS, Insurance, IT..." autocomplete="off"/></div>
    </div>
    <div style="margin-bottom:16px">
      <div class="rl">Why are you losing? * (select all that apply)</div>
      <div class="rw">
        <button class="rtag" data-id="late">Entered deal late</button>
        <button class="rtag" data-id="price">Pricing is higher</button>
        <button class="rtag" data-id="discount">Limited discounts</button>
        <button class="rtag" data-id="partner">Partner pushing competitor</button>
        <button class="rtag" data-id="delivery">Slower delivery</button>
        <button class="rtag" data-id="features">Competitor has better features</button>
        <button class="rtag" data-id="incumbent">Competitor is incumbent</button>
        <button class="rtag" data-id="relationship">Weaker exec relationship</button>
      </div>
    </div>
    <div class="field" style="margin-bottom:18px">
      <label>Additional context <span style="font-weight:400;color:var(--muted2)">(optional — significantly improves output)</span></label>
      <textarea id="context" placeholder="Deal value, company size, key stakeholders, what the customer said..."></textarea>
    </div>
    <div id="err" class="err" style="display:none"></div>
    <button class="cta-btn" id="flipBtn" onclick="handleFlip()">Flip this deal &#8594;</button>
  </div>
  <div id="output"></div>
</div>

<script>
const selected = new Set();
const RL = {
  late:'Entered the deal late — competitor has the head start',
  price:'Pricing is higher than competitor',
  discount:'Limited discount flexibility',
  partner:'Partner is actively pushing competitor',
  delivery:'Slower product delivery or roadmap',
  features:'Competitor has better or more features',
  incumbent:'Competitor is the incumbent solution',
  relationship:'Weaker executive or champion relationship'
};

document.querySelectorAll('.rtag').forEach(b => {
  b.onclick = () => {
    const id = b.dataset.id;
    if (selected.has(id)) { selected.delete(id); b.classList.remove('on'); }
    else { selected.add(id); b.classList.add('on'); }
  };
});

async function handleFlip() {
  const product    = document.getElementById('product').value.trim();
  const competitor = document.getElementById('competitor').value.trim();
  const stage      = document.getElementById('stage').value;
  const industry   = document.getElementById('industry').value.trim();
  const context    = document.getElementById('context').value.trim();
  const your_sku   = document.getElementById('your_sku').value.trim();
  const comp_sku   = document.getElementById('comp_sku').value.trim();
  const errEl      = document.getElementById('err');

  if (!product || !competitor || !stage || selected.size === 0) {
    errEl.textContent = 'Please fill in product, competitor, deal stage and select at least one reason.';
    errEl.style.display = 'block'; return;
  }
  errEl.style.display = 'none';
  const reasons = [...selected].map(id => RL[id]).join('; ');
  const btn = document.getElementById('flipBtn');
  btn.disabled = true; btn.textContent = 'Generating your rescue plan...';
  document.getElementById('output').innerHTML = '';

  try {
    const res  = await fetch('/api/rescue', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ product, competitor, stage, industry, reasons, context, your_sku, comp_sku }) });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    window._flipInput = { product, competitor, deal_stage: stage, losing_reason: reasons, industry };
    renderOutput(data, product, competitor);
    document.getElementById('output').scrollIntoView({ behavior:'smooth', block:'start' });
  } catch(e) {
    errEl.textContent = 'Error: ' + e.message; errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Flip this deal ->';
  }
}

function uc(u) { if (!u) return 'um'; const v = u.toLowerCase(); return v==='high'?'uh':v==='low'?'ul':'um'; }
function wc(p) { return p >= 60 ? '#30a46c' : p >= 35 ? '#e5a00d' : '#e5484d'; }

function renderOutput(d, product, competitor) {
  const a  = d.dealAssessment, wp = Number(a.winProbability);
  const mvs  = (d.counterMoves||[]).map((m,i) =>
    '<div class="mv"><div class="mvn">' + (i+1) + '</div><div class="mvb"><div class="mvh"><span class="mvt">' +
    m.move + '</span><span class="mvtime">' + m.timing + '</span></div><div class="mva">' + m.action + '</div></div></div>'
  ).join('');
  const msgs = (d.talkTrack.keyMessages||[]).map(m => '<div class="kmsg"><span class="ck">&#10003;</span><span>' + m + '</span></div>').join('');
  const objs = (d.talkTrack.objectionHandlers||[]).map(o =>
    '<div class="obi"><div class="obq">"' + o.objection + '"</div><div class="oba">' + o.response + '</div></div>'
  ).join('');
  const weaks = (d.competitorWeaknesses||[]).map(w =>
    '<div class="kmsg"><span style="color:var(--red);flex-shrink:0;margin-top:3px;font-size:13px">&#10005;</span><span style="font-size:13px;color:var(--muted)">' + w + '</span></div>'
  ).join('');

  document.getElementById('output').innerHTML =
    '<div class="out-section"><div class="sl">Deal assessment &#8212; ' + product + ' vs ' + competitor + '</div>' +
    '<div class="arow"><div><div class="wp" style="color:' + wc(wp) + '">' + wp + '%</div><div class="wb">win probability</div></div>' +
    '<div><div class="ubadge ' + uc(a.urgency) + '">' + a.urgency + ' urgency</div><div class="at">' + a.summary + '</div></div></div></div>' +
    (weaks ? '<div class="out-section"><div class="sl">Verified competitor weaknesses</div>' + weaks + '</div>' : '') +
    '<div class="kcard"><div class="kl">The kill shot</div><div class="kt">"' + d.killShot + '"</div></div>' +
    '<div class="out-section"><div class="sl">Counter-moves</div>' + mvs + '</div>' +
    '<div class="out-section"><div class="sl">Talk track</div><div class="ttsub">Opening line</div><div class="ttop">' +
    d.talkTrack.opening + '</div><div class="ttsub">Key messages</div><div style="margin-bottom:14px">' + msgs + '</div>' +
    '<div class="ttsub">Objection handlers</div>' + objs + '</div>' +
    '<div class="out-section"><div class="sl">Email template</div><div class="ew"><div class="em">To: [Prospect name]</div>' +
    '<div class="es">' + d.emailTemplate.subject + '</div><div class="eb">' + d.emailTemplate.body + '</div></div></div>' +
    '<div class="act-row">' +
    '<button class="abt" onclick="copyAll(this)">Copy full plan</button>' +
    '<button class="abt" onclick="copyEmail(this)">Copy email only</button>' +
    '<button class="abt share-btn" id="shareBtn" onclick="sharePlan(this)">&#128279; Get shareable link</button>' +
    '<button class="abt" onclick="newDeal()">New deal</button>' +
    '</div>' +
    '<div class="share-result" id="shareResult">' +
    '<span class="share-url-text" id="shareUrlText"></span>' +
    '<button class="copy-link-btn" id="copyLinkBtn" onclick="copyShareLink(this)">Copy link</button>' +
    '</div>';

  window._ld = d;
}

async function sharePlan(btn) {
  if (!window._ld || !window._flipInput) return;
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const res = await fetch('/api/save-plan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        product:      window._flipInput.product,
        competitor:   window._flipInput.competitor,
        deal_stage:   window._flipInput.deal_stage,
        losing_reason: window._flipInput.losing_reason,
        industry:     window._flipInput.industry,
        plan_data:    window._ld
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const url = window.location.origin + '/plan?id=' + data.id;
    window._shareUrl = url;
    document.getElementById('shareUrlText').textContent = url;
    document.getElementById('shareResult').classList.add('visible');
    btn.textContent = '&#10003; Link ready';
  } catch(e) {
    btn.textContent = 'Error — try again'; btn.disabled = false;
  }
}

function copyShareLink(btn) {
  if (!window._shareUrl) return;
  navigator.clipboard.writeText(window._shareUrl).then(() => {
    btn.textContent = 'Copied!'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy link'; btn.classList.remove('ok'); }, 2000);
  });
}

function copyAll(btn) {
  const d = window._ld; if (!d) return;
  const mv = (d.counterMoves||[]).map((m,i) => (i+1) + '. ' + m.move + ' [' + m.timing + ']
   ' + m.action).join('

');
  const ms = (d.talkTrack.keyMessages||[]).map(m => '- ' + m).join('
');
  const ob = (d.talkTrack.objectionHandlers||[]).map(o => 'Q: "' + o.objection + '"
A: ' + o.response).join('

');
  const t = 'FLIPIT DEAL RESCUE PLAN
=======================
Win Probability: ' + d.dealAssessment.winProbability +
    '% | Urgency: ' + d.dealAssessment.urgency + '

' + d.dealAssessment.summary +
    '

THE KILL SHOT
"' + d.killShot + '"

COUNTER-MOVES
' + mv +
    '

TALK TRACK
Opening: ' + d.talkTrack.opening + '

Key Messages:
' + ms +
    '

Objection Handlers:
' + ob + '

EMAIL
Subject: ' + d.emailTemplate.subject +
    '

' + d.emailTemplate.body + '

---
Generated by FlipIt - flipit.fyi';
  navigator.clipboard.writeText(t).then(() => {
    btn.textContent = 'Copied!'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy full plan'; btn.classList.remove('ok'); }, 2000);
  });
}

function copyEmail(btn) {
  const d = window._ld; if (!d) return;
  navigator.clipboard.writeText('Subject: ' + d.emailTemplate.subject + '

' + d.emailTemplate.body).then(() => {
    btn.textContent = 'Copied!'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy email only'; btn.classList.remove('ok'); }, 2000);
  });
}

function newDeal() {
  document.getElementById('output').innerHTML = '';
  ['product','competitor','industry','context','your_sku','comp_sku'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('stage').value = '';
  selected.clear(); document.querySelectorAll('.rtag').forEach(b => b.classList.remove('on'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
