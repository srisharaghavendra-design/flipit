<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlipIt — Get Your Deal Rescue Plan</title>
<meta name="description" content="Enter your competitive deal situation and get an AI-powered rescue plan in 60 seconds." />
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#080808;--surface:#111111;--surface2:#181818;--border:#222222;--border2:#2e2e2e;--text:#f0f0f0;--muted:#777777;--muted2:#444444;--red:#e5484d;--red-dim:#c03a3e;--red-bg:#180a0a;--red-border:#2e1010;--green:#30a46c;--green-bg:#0a1a10;--amber:#e5a00d;--amber-bg:#1a1200;--blue:#6366f1;--blue-bg:#0f0f1a;--blue-border:#1e1e3a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:56px;background:rgba(8,8,8,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nl{display:flex;align-items:center;gap:8px}
.nm{width:28px;height:28px;border-radius:7px;background:var(--red);display:flex;align-items:center;justify-content:center}
.nn{font-size:16px;font-weight:600;letter-spacing:-0.3px}
.nt{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--surface2);border:1px solid var(--border2);color:var(--muted);font-family:'DM Mono',monospace}
.nb{padding:7px 16px;border-radius:7px;background:transparent;border:1px solid var(--border2);color:var(--muted);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none}
.nb:hover{color:var(--text);border-color:var(--border)}
.page{max-width:720px;margin:0 auto;padding:90px 1.5rem 4rem}
.page-hdr{text-align:center;margin-bottom:2.5rem}
.page-hdr h1{font-size:clamp(26px,4vw,36px);font-weight:600;letter-spacing:-1px;margin-bottom:8px}
.page-hdr p{font-size:15px;color:var(--muted)}
.industries{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-bottom:2rem}
.ind-tag{font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);font-family:'DM Mono',monospace}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem;margin-bottom:1.5rem}
.section-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:12px;font-family:'DM Mono',monospace;padding-bottom:8px;border-bottom:1px solid var(--border)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;color:var(--muted);font-weight:500}
.field input,.field select,.field textarea{background:var(--surface2);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 13px;outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#3a3a3a}
.field select{appearance:none;cursor:pointer}
.field select:disabled{opacity:.4;cursor:not-allowed}
.field textarea{resize:vertical;min-height:72px}
.rl{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:8px}
.rw{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.rtag{padding:7px 13px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.rtag:hover{border-color:#3a3a3a;color:var(--text)}
.rtag.on{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.depth-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.dtag{padding:6px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'DM Mono',monospace}
.dtag.on{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}
.cta-btn{width:100%;padding:14px;background:var(--red);border:none;border-radius:9px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}
.cta-btn:hover{background:var(--red-dim)}
.cta-btn:disabled{opacity:.45;cursor:not-allowed}
.err{font-size:13px;color:var(--red);background:var(--red-bg);border:1px solid var(--red-border);border-radius:8px;padding:10px 13px;margin-bottom:12px}
.warn-box{font-size:13px;color:var(--amber);background:var(--amber-bg);border:1px solid #2e2000;border-radius:8px;padding:10px 13px;margin-bottom:12px;display:none}
.out-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.sl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:14px;font-family:'DM Mono',monospace}
.arow{display:flex;align-items:flex-start;gap:1.5rem;margin-bottom:4px}
.wp{font-size:52px;font-weight:600;line-height:1;letter-spacing:-3px}
.wb{font-size:12px;color:var(--muted);margin-top:3px}
.ubadge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 10px;border-radius:5px;margin-bottom:8px;font-family:'DM Mono',monospace}
.uh{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}
.um{background:var(--amber-bg);border:1px solid #2e2000;color:var(--amber)}
.ul{background:var(--green-bg);border:1px solid #0a2a14;color:var(--green)}
.at{font-size:14px;color:var(--muted);line-height:1.7}
.kcard{background:var(--red-bg);border:1px solid var(--red-border);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.kl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-bottom:10px;font-family:'DM Mono',monospace}
.kt{font-size:16px;font-weight:500;line-height:1.65;font-style:italic}
.pcard{background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.pl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:10px;font-family:'DM Mono',monospace}
.mv{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--border)}
.mv:last-child{border-bottom:none;padding-bottom:0}
.mv:first-child{padding-top:0}
.mvn{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--muted);flex-shrink:0;margin-top:1px;font-family:'DM Mono',monospace}
.mvb{flex:1;min-width:0}
.mvh{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.mvt{font-size:14px;font-weight:600}
.mvtime{font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:2px 9px;border-radius:4px;white-space:nowrap;font-family:'DM Mono',monospace}
.mva{font-size:13px;color:var(--muted);line-height:1.65}
.mvlevel{font-size:10px;color:var(--blue);background:var(--blue-bg);border:1px solid var(--blue-border);padding:1px 7px;border-radius:4px;font-family:'DM Mono',monospace;margin-left:6px}
.ttop{background:var(--surface2);border-radius:9px;border-left:3px solid var(--border2);padding:11px 14px;font-size:14px;line-height:1.7;margin-bottom:14px}
.ttsub{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px;font-family:'DM Mono',monospace}
.kmsg{display:flex;gap:9px;font-size:14px;line-height:1.6;margin-bottom:9px}
.ck{color:var(--green);flex-shrink:0;margin-top:3px;font-size:13px}
.obi{margin-bottom:11px}
.obq{font-size:12px;color:var(--amber);font-style:italic;margin-bottom:5px;padding-left:10px;border-left:2px solid var(--amber)}
.oba{font-size:13px;color:var(--muted);line-height:1.65}
.ew{background:var(--surface2);border-radius:10px;padding:14px 16px}
.em{font-size:12px;color:var(--muted2);margin-bottom:4px;font-family:'DM Mono',monospace}
.es{font-size:14px;font-weight:600;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:12px}
.eb{font-size:13px;color:var(--muted);line-height:1.8;white-space:pre-line}
.act-row{display:flex;gap:10px;margin-top:1rem;flex-wrap:wrap}
.abt{flex:1;min-width:120px;padding:10px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;text-align:center}
.abt:hover{border-color:#3a3a3a;color:var(--text)}
.abt.ok{color:var(--green);border-color:var(--green)}
.abt.share-btn{background:var(--surface2);border-color:var(--blue-border);color:var(--blue)}
.abt.share-btn:hover{background:var(--blue-bg);border-color:var(--blue)}
.abt.flip-btn{background:var(--surface2);border-color:#2e1a3a;color:#a855f7}
.abt.flip-btn:hover{background:#100a1a;border-color:#a855f7}
.abt.wl-win{color:var(--green);border-color:var(--green)}
.abt.wl-loss{color:var(--red);border-color:var(--red-border)}
.share-result{display:none;margin-top:10px;background:var(--blue-bg);border:1px solid var(--blue-border);border-radius:8px;padding:10px 14px;align-items:center;gap:10px;flex-wrap:wrap}
.share-result.visible{display:flex}
.share-url-text{flex:1;font-size:12px;color:var(--blue);font-family:'DM Mono',monospace;word-break:break-all}
.copy-link-btn{padding:5px 12px;border-radius:6px;background:var(--surface);border:1px solid var(--blue-border);color:var(--blue);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s}
.copy-link-btn:hover{border-color:var(--blue)}
.copy-link-btn.ok{color:var(--green);border-color:var(--green)}
.wl-row{display:flex;gap:8px;margin-top:8px;align-items:center}
.wl-label{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
.partner-intel{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--muted);line-height:1.6;display:none}
.partner-intel.visible{display:block}
.size-warn{background:var(--amber-bg);border:1px solid #2e2000;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--amber);line-height:1.6;display:none}
.size-warn.visible{display:block}
@media(max-width:600px){
  nav{padding:0 1rem}
  .page{padding:72px 1rem 3rem}
  .page-hdr{margin-bottom:1.5rem}
  .page-hdr h1{font-size:24px;letter-spacing:-0.5px}
  .grid2{grid-template-columns:1fr;gap:10px;margin-bottom:10px}
  .grid3{grid-template-columns:1fr;gap:10px;margin-bottom:10px}
  .form-card{padding:1rem;border-radius:12px}
  .field input,.field select,.field textarea{font-size:16px;padding:12px 13px}
  .rtag{padding:8px 12px;font-size:12px}
  .cta-btn{padding:16px;font-size:15px}
  .arow{flex-direction:column;gap:8px}
  .wp{font-size:44px}
  .act-row{flex-direction:column}
  .abt{min-width:unset;width:100%}
  .out-section{padding:1rem;border-radius:12px}
  .kcard{padding:1rem;border-radius:12px}
  .pcard{padding:1rem;border-radius:12px}
  .share-result{flex-direction:column;align-items:stretch}
  .copy-link-btn{text-align:center}
}
</style>
</head>
<body>
<nav>
  <a href="/" class="nl" style="text-decoration:none">
    <div class="nm"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5L12.5 11.5H1.5L7 1.5Z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/></svg></div>
    <span class="nn">FlipIt</span>
    <span class="nt">beta</span>
  </a>
  <a href="/pricing" class="nb">Pricing</a>
</nav>
<div class="page">
  <div class="page-hdr">
    <h1>Get your deal rescue plan</h1>
    <p>Fill in your situation &mdash; your plan is ready in 60 seconds</p>
  </div>
  <div class="industries">
    <span class="ind-tag">HR Tech</span><span class="ind-tag">CRM</span><span class="ind-tag">ITSM</span>
    <span class="ind-tag">Cyber Security</span><span class="ind-tag">Collaboration</span>
    <span class="ind-tag">Cloud / Infra</span><span class="ind-tag">CCaaS</span><span class="ind-tag">Any B2B vertical</span>
  </div>
  <div class="form-card">
    <div class="section-label">Your Product</div>
    <div class="grid3" style="margin-bottom:14px">
      <div class="field">
        <label>Company *</label>
        <select id="your_company" onchange="updateCategories('your')">
          <option value="">Select company</option>
        </select>
      </div>
      <div class="field">
        <label>Category *</label>
        <select id="your_category" onchange="updateSKUs('your')" disabled>
          <option value="">Select category</option>
        </select>
      </div>
      <div class="field">
        <label>Product / SKU *</label>
        <select id="your_sku" disabled>
          <option value="">Select product</option>
        </select>
      </div>
    </div>
    <div class="section-label" style="margin-top:6px">Competitor</div>
    <div class="grid3" style="margin-bottom:14px">
      <div class="field">
        <label>Company *</label>
        <select id="comp_company" onchange="updateCategories('comp')">
          <option value="">Select company</option>
        </select>
      </div>
      <div class="field">
        <label>Category *</label>
        <select id="comp_category" onchange="updateSKUs('comp')" disabled>
          <option value="">Select category</option>
        </select>
      </div>
      <div class="field">
        <label>Product / SKU *</label>
        <select id="comp_sku" disabled>
          <option value="">Select product</option>
        </select>
      </div>
    </div>
    <div class="section-label" style="margin-top:6px">Deal Context</div>
    <div class="grid2">
      <div class="field">
        <label>Deal stage *</label>
        <select id="stage">
          <option value="">Select stage</option>
          <option>Qualification</option><option>Discovery</option><option>Demo / Evaluation</option>
          <option>Proposal</option><option>Negotiation</option><option>Final Decision</option>
        </select>
      </div>
      <div class="field">
        <label>Industry</label>
        <input type="text" id="industry" placeholder="e.g. SaaS, Insurance, IT..." autocomplete="off"/>
      </div>
    </div>
    <div class="grid2">
      <div class="field">
        <label>Company size</label>
        <select id="company_size">
          <option value="">Select size</option>
          <option value="smb">SMB (1-100 employees)</option>
          <option value="mid">Mid-market (100-1000 employees)</option>
          <option value="enterprise">Enterprise (1000+ employees)</option>
          <option value="global">Global Enterprise (10,000+)</option>
        </select>
      </div>
      <div class="field">
        <label>Approx deal size</label>
        <select id="deal_size">
          <option value="">Select range</option>
          <option value="small">Under $10k</option>
          <option value="mid">$10k - $50k</option>
          <option value="large">$50k - $200k</option>
          <option value="enterprise">$200k - $1M</option>
          <option value="strategic">$1M+</option>
        </select>
      </div>
    </div>
    <div class="field" style="margin-bottom:14px">
      <label>Incumbent / Channel Partner <span style="font-weight:400;color:var(--muted2)">(optional but improves partner strategy)</span></label>
      <input type="text" id="partner" placeholder="e.g. Westcon, Ingram Micro, CDW, SHI..." autocomplete="off"/>
    </div>
    <div id="sizeWarn" class="size-warn"></div>
    <div style="margin-bottom:16px">
      <div class="rl">Why are you losing? * (select all that apply)</div>
      <div class="rw">
        <button class="rtag" data-id="late">Entered deal late</button>
        <button class="rtag" data-id="price">Pricing is higher</button>
        <button class="rtag" data-id="discount">Limited discounts</button>
        <button class="rtag" data-id="partner">Partner pushing competitor</button>
        <button class="rtag" data-id="delivery">Slower delivery</button>
        <button class="rtag" data-id="features">Competitor has better features</button>
        <button class="rtag" data-id="incumbent">Competitor is incumbent</button>
        <button class="rtag" data-id="relationship">Weaker exec relationship</button>
        <button class="rtag" data-id="technical">Lost technical evaluation</button>
        <button class="rtag" data-id="greenfield">No budget / greenfield</button>
      </div>
    </div>
    <div style="margin-bottom:16px">
      <div class="rl">Technical depth of output</div>
      <div class="depth-row">
        <button class="dtag" data-depth="1">L1 Business</button>
        <button class="dtag on" data-depth="2">L2 Technical</button>
        <button class="dtag" data-depth="3">L3 Architecture</button>
        <button class="dtag" data-depth="4">L4 Integration</button>
        <button class="dtag" data-depth="5">L5 Evidence</button>
      </div>
    </div>
    <div class="field" style="margin-bottom:18px">
      <label>Additional context <span style="font-weight:400;color:var(--muted2)">(optional &mdash; significantly improves output)</span></label>
      <textarea id="context" placeholder="Key stakeholders, what the customer said, previous meetings, budget situation..."></textarea>
    </div>
    <div id="err" class="err" style="display:none"></div>
    <button class="cta-btn" id="flipBtn" onclick="handleFlip()">Flip this deal &#8594;</button>
  </div>
  <div id="output"></div>
</div>
<script>

// Init dropdowns
function initDropdowns() {
  const companies = Object.keys(PRODUCT_DB).sort();
  ['your_company','comp_company'].forEach(id => {
    const sel = document.getElementById(id);
    companies.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      sel.appendChild(opt);
    });
  });
}

function updateCategories(side) {
  const company = document.getElementById(side + '_company').value;
  const catSel = document.getElementById(side + '_category');
  const skuSel = document.getElementById(side + '_sku');
  catSel.innerHTML = '<option value="">Select category</option>';
  skuSel.innerHTML = '<option value="">Select product</option>';
  skuSel.disabled = true;
  if (!company) { catSel.disabled = true; return; }
  catSel.disabled = false;
  const cats = Object.keys(PRODUCT_DB[company]);
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    catSel.appendChild(opt);
  });
}

function updateSKUs(side) {
  const company = document.getElementById(side + '_company').value;
  const category = document.getElementById(side + '_category').value;
  const skuSel = document.getElementById(side + '_sku');
  skuSel.innerHTML = '<option value="">Select product</option>';
  if (!company || !category) { skuSel.disabled = true; return; }
  skuSel.disabled = false;
  const skus = PRODUCT_DB[company][category] || [];
  skus.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    skuSel.appendChild(opt);
  });
  checkSizeMismatch();
}

function checkSizeMismatch() {
  const sku = document.getElementById('your_sku').value;
  const size = document.getElementById('company_size').value;
  const warn = document.getElementById('sizeWarn');
  if (sku && (size === 'smb') && SMB_ENTERPRISE_MISMATCHES[sku]) {
    warn.textContent = '⚠️ Product-fit alert: ' + SMB_ENTERPRISE_MISMATCHES[sku].suggestion;
    warn.classList.add('visible');
  } else {
    warn.classList.remove('visible');
  }
}

// Chip handlers
document.querySelectorAll('.rtag').forEach(b => {
  b.onclick = () => {
    const id = b.dataset.id;
    if (selected.has(id)) { selected.delete(id); b.classList.remove('on'); }
    else { selected.add(id); b.classList.add('on'); }
  };
});

// Depth handlers
document.querySelectorAll('.dtag').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.dtag').forEach(d => d.classList.remove('on'));
    b.classList.add('on');
    selectedDepth = parseInt(b.dataset.depth);
  };
});

document.getElementById('company_size').addEventListener('change', checkSizeMismatch);
document.getElementById('your_sku').addEventListener('change', checkSizeMismatch);

const DEPTH_LABELS = {
  1: 'Business',
  2: 'Technical',
  3: 'Architecture',
  4: 'Integration',
  5: 'Evidence-Based'
};

const DEPTH_INSTRUCTIONS = {
  1: 'Focus on business value, ROI, and executive-level talking points. Avoid technical jargon.',
  2: 'Include specific features, specs, and technical capabilities. Reference actual product names and version differences.',
  3: 'Go deep on how each product is architecturally different — cloud vs on-premise, API limits, data models, processing architecture, scalability limits.',
  4: 'Focus on integration complexity, implementation timelines, professional services requirements, admin overhead, and total cost of ownership including hidden costs.',

async function handleFlip() {
  const yourCompany = document.getElementById('your_company').value;
  const yourCategory = document.getElementById('your_category').value;
  const yourSku = document.getElementById('your_sku').value;
  const compCompany = document.getElementById('comp_company').value;
  const compCategory = document.getElementById('comp_category').value;
  const compSku = document.getElementById('comp_sku').value;
  const stage = document.getElementById('stage').value;
  const industry = document.getElementById('industry').value.trim();
  const companySize = document.getElementById('company_size').value;
  const dealSize = document.getElementById('deal_size').value;
  const partner = document.getElementById('partner').value.trim();
  const context = document.getElementById('context').value.trim();
  const errEl = document.getElementById('err');

  if (!yourCompany || !yourSku || !compCompany || !compSku || !stage || selected.size === 0) {
    errEl.textContent = 'Please select your product, competitor product, deal stage and at least one loss reason.';
    errEl.style.display = 'block'; return;
  }
  errEl.style.display = 'none';

  const product = yourCompany + ' ' + yourSku;
  const competitor = compCompany + ' ' + compSku;
  const reasons = [...selected].map(id => RL[id]).join('; ');
  const btn = document.getElementById('flipBtn');
  btn.disabled = true; btn.textContent = 'Generating your rescue plan...';
  document.getElementById('output').innerHTML = '';

  try {
    const res = await fetch('/api/rescue', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        product, competitor, stage, industry, reasons, context,
        your_sku: yourSku, comp_sku: compSku,
        your_company: yourCompany, comp_company: compCompany,
        company_size: companySize, deal_size: dealSize,
        partner, depth: selectedDepth,
        depth_label: DEPTH_LABELS[selectedDepth]
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    window._flipInput = { product, competitor, deal_stage: stage, losing_reason: reasons, industry };
    renderOutput(data, product, competitor);
    document.getElementById('output').scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch(e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Flip this deal ->';
  }
}

function uc(u) { if (!u) return 'um'; const v = u.toLowerCase(); return v==='high'?'uh':v==='low'?'ul':'um'; }
function wc(p) { return p >= 60 ? '#30a46c' : p >= 35 ? '#e5a00d' : '#e5484d'; }

function renderOutput(d, product, competitor) {
  const a = d.dealAssessment, wp = Number(a.winProbability);
  const mvs = (d.counterMoves||[]).map((m,i) =>
    '<div class="mv"><div class="mvn">' + (i+1) + '</div><div class="mvb"><div class="mvh"><span class="mvt">' + m.move + '</span><span class="mvtime">' + m.timing + '</span></div><div class="mva">' + m.action + '</div></div></div>'
  ).join('');
  const msgs = (d.talkTrack.keyMessages||[]).map(m => '<div class="kmsg"><span class="ck">&#10003;</span><span>' + m + '</span></div>').join('');
  const objs = (d.talkTrack.objectionHandlers||[]).map(o => '<div class="obi"><div class="obq">"' + o.objection + '"</div><div class="oba">' + o.response + '</div></div>').join('');
  const weaks = (d.competitorWeaknesses||[]).map(w => '<div class="kmsg"><span style="color:var(--red);flex-shrink:0;margin-top:3px;font-size:13px">&#10005;</span><span style="font-size:13px;color:var(--muted)">' + w + '</span></div>').join('');
  const partnerHtml = d.partnerIntel ? '<div class="pcard"><div class="pl">&#128101; Partner Intelligence</div><div style="font-size:13px;color:var(--muted);line-height:1.7">' + d.partnerIntel + '</div></div>' : '';
  const sizeHtml = d.sizeRecommendation ? '<div style="background:var(--amber-bg);border:1px solid #2e2000;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem"><div style="font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:8px;font-family:DM Mono,monospace">&#9888; Product Fit Advisory</div><div style="font-size:13px;color:var(--muted);line-height:1.7">' + d.sizeRecommendation + '</div></div>' : '';

  document.getElementById('output').innerHTML =
    '<div class="out-section"><div class="sl">Deal assessment &#8212; ' + product + ' vs ' + competitor + '</div>' +
    '<div class="arow"><div><div class="wp" style="color:' + wc(wp) + '">' + wp + '%</div><div class="wb">win probability</div></div>' +
    '<div><div class="ubadge ' + uc(a.urgency) + '">' + a.urgency + ' urgency</div><div class="at">' + a.summary + '</div></div></div></div>' +
    sizeHtml +
    partnerHtml +
    (weaks ? '<div class="out-section"><div class="sl">Verified competitor weaknesses</div>' + weaks + '</div>' : '') +
    '<div class="kcard"><div class="kl">The kill shot</div><div class="kt">"' + d.killShot + '"</div></div>' +
    '<div class="out-section"><div class="sl">Counter-moves</div>' + mvs + '</div>' +
    '<div class="out-section"><div class="sl">Talk track</div><div class="ttsub">Opening line</div><div class="ttop">' + d.talkTrack.opening + '</div><div class="ttsub">Key messages</div><div style="margin-bottom:14px">' + msgs + '</div><div class="ttsub">Objection handlers</div>' + objs + '</div>' +
    '<div class="out-section"><div class="sl">Email template</div><div class="ew"><div class="em">To: [Prospect name]</div><div class="es">' + d.emailTemplate.subject + '</div><div class="eb">' + d.emailTemplate.body + '</div></div></div>' +
    '<div class="act-row">' +
    '<button class="abt" onclick="copyAll(this)">Copy full plan</button>' +
    '<button class="abt" onclick="copyEmail(this)">Copy email only</button>' +
    '<button class="abt share-btn" onclick="sharePlan(this)">&#128279; Get shareable link</button>' +
    '<button class="abt flip-btn" onclick="seeTheirPitch(this)">&#128260; See how they pitch against you</button>' +
    '<button class="abt" onclick="newDeal()">New deal</button>' +
    '</div>' +
    '<div class="wl-row"><span class="wl-label">How did this deal go?</span><button class="abt wl-win" style="flex:0;padding:6px 16px;font-size:12px" onclick="trackOutcome(this,\'won\')">&#10003; Won</button><button class="abt wl-loss" style="flex:0;padding:6px 16px;font-size:12px" onclick="trackOutcome(this,\'lost\')">&#10005; Lost</button><button class="abt" style="flex:0;padding:6px 16px;font-size:12px" onclick="trackOutcome(this,\'open\')">Still open</button></div>' +
    '<div class="share-result" id="shareResult"><span class="share-url-text" id="shareUrlText"></span><button class="copy-link-btn" onclick="copyShareLink(this)">Copy link</button></div>';
  window._ld = d;
}

async function seeTheirPitch(btn) {
  if (!window._flipInput) return;
  btn.disabled = true; btn.textContent = 'Analyzing their playbook...';
  try {
    const res = await fetch('/api/rescue', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        product: window._flipInput.competitor,
        competitor: window._flipInput.product,
        stage: window._flipInput.deal_stage,
        industry: window._flipInput.industry,
        reasons: 'Pricing is higher; Competitor has better features; Competitor is incumbent',
        context: 'Show me exactly how ' + window._flipInput.competitor + ' reps are trained to attack ' + window._flipInput.product,
        depth: 3,
        depth_label: 'Architecture',
        flip_mode: true
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const section = document.createElement('div');
    section.style.cssText = 'background:#100a1a;border:1px solid #2e1a3a;border-radius:14px;padding:1.25rem 1.5rem;margin-top:1rem';
    const weaks = (data.competitorWeaknesses||[]).map(w => '<div class="kmsg"><span style="color:#a855f7;flex-shrink:0;font-size:13px">!</span><span style="font-size:13px;color:var(--muted)">' + w + '</span></div>').join('');
    const objs = (data.talkTrack.objectionHandlers||[]).map(o => '<div class="obi"><div class="obq">"' + o.objection + '"</div><div class="oba">' + o.response + '</div></div>').join('');
    section.innerHTML = '<div style="font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#a855f7;margin-bottom:12px;font-family:DM Mono,monospace">&#128260; How ' + window._flipInput.competitor.split(' ')[0] + ' pitches against you</div>' +
      '<div style="font-size:13px;color:#a855f7;font-style:italic;margin-bottom:12px;padding:10px 14px;background:#0a0510;border-radius:8px;border-left:3px solid #a855f7">"' + data.killShot + '"</div>' +
      (weaks ? '<div style="margin-bottom:12px">' + weaks + '</div>' : '') +
      '<div style="font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;font-family:DM Mono,monospace">Their objections against you</div>' + objs;
    document.getElementById('output').appendChild(section);
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    btn.textContent = '&#128260; See how they pitch against you';
    btn.disabled = false;
  } catch(e) {
    btn.textContent = 'Error - try again'; btn.disabled = false;
  }
}

async function trackOutcome(btn, outcome) {
  if (!window._flipInput) return;
  btn.textContent = outcome === 'won' ? '&#10003; Marked as Won' : outcome === 'lost' ? '&#10005; Marked as Lost' : 'Marked as Open';
  btn.disabled = true;
  try {
    await fetch('/api/track-outcome', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ ...window._flipInput, outcome, plan_id: window._shareUrl?.split('id=')[1] })
    });
  } catch(e) { console.log('outcome tracking failed silently'); }
}

async function sharePlan(btn) {
  if (!window._ld || !window._flipInput) return;
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const res = await fetch('/api/save-plan', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ ...window._flipInput, plan_data: window._ld })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const url = window.location.origin + '/plan?id=' + data.id;
    window._shareUrl = url;
    document.getElementById('shareUrlText').textContent = url;
    document.getElementById('shareResult').classList.add('visible');
    btn.textContent = '\u2713 Link ready';
  } catch(e) { btn.textContent = 'Error - try again'; btn.disabled = false; }
}

function copyShareLink(btn) {
  if (!window._shareUrl) return;
  navigator.clipboard.writeText(window._shareUrl).then(() => {
    btn.textContent = 'Copied!'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy link'; btn.classList.remove('ok'); }, 2000);
  });
}

function copyAll(btn) {
  const d = window._ld; if (!d) return;
  const mv = (d.counterMoves||[]).map((m,i) => (i+1) + '. ' + m.move + ' [' + m.timing + '] ' + m.action).join('\n');
  const ms = (d.talkTrack.keyMessages||[]).map(m => '- ' + m).join('\n');
  const ob = (d.talkTrack.objectionHandlers||[]).map(o => 'Q: "' + o.objection + '" A: ' + o.response).join('\n');
  const t = 'FLIPIT DEAL RESCUE PLAN\n=======================\nWin Probability: ' + d.dealAssessment.winProbability + '% | Urgency: ' + d.dealAssessment.urgency + '\n' + d.dealAssessment.summary + '\n\nTHE KILL SHOT\n"' + d.killShot + '"\n\nCOUNTER-MOVES\n' + mv + '\n\nTALK TRACK\nOpening: ' + d.talkTrack.opening + '\nKey Messages:\n' + ms + '\nObjection Handlers:\n' + ob + '\n\nEMAIL\nSubject: ' + d.emailTemplate.subject + '\n\n' + d.emailTemplate.body + '\n\n---\nGenerated by FlipIt - flipit.fyi';
  navigator.clipboard.writeText(t).then(() => { btn.textContent = 'Copied!'; btn.classList.add('ok'); setTimeout(() => { btn.textContent = 'Copy full plan'; btn.classList.remove('ok'); }, 2000); });
}

function copyEmail(btn) {
  const d = window._ld; if (!d) return;
  navigator.clipboard.writeText('Subject: ' + d.emailTemplate.subject + '\n\n' + d.emailTemplate.body).then(() => {
    btn.textContent = 'Copied!'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy email only'; btn.classList.remove('ok'); }, 2000);
  });
}

function newDeal() {
  document.getElementById('output').innerHTML = '';
  ['your_company','your_category','your_sku','comp_company','comp_category','comp_sku','stage','industry','company_size','deal_size','partner','context'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  ['your_category','your_sku','comp_category','comp_sku'].forEach(id => {
    document.getElementById(id).disabled = true;
  });
  selected.clear();
  document.querySelectorAll('.rtag').forEach(b => b.classList.remove('on'));
  document.getElementById('sizeWarn').classList.remove('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

initDropdowns();
</script>
