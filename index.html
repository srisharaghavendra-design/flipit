<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlipIt — Deal Rescue for B2B Sales Teams</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --border2: #333333;
    --text: #f0f0f0;
    --muted: #888888;
    --muted2: #555555;
    --red: #e5484d;
    --red-bg: #1a0a0a;
    --red-border: #3a1a1a;
    --green: #30a46c;
    --green-bg: #0a1a0f;
    --amber: #e5a00d;
    --amber-bg: #1a1400;
    --accent: #e5484d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  .page { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* Header */
  .header { margin-bottom: 2.5rem; }
  .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .logo-mark {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--red); display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { display: block; }
  .logo-name { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  .logo-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-family: 'DM Mono', monospace;
  }
  .header-sub { font-size: 15px; color: var(--muted); }

  /* Form card */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 13px; color: var(--muted); font-weight: 500; }
  .field input, .field select, .field textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--border2);
  }
  .field select { appearance: none; cursor: pointer; }
  .field textarea { resize: vertical; }

  /* Reasons */
  .reasons-label { font-size: 13px; color: var(--muted); font-weight: 500; margin-bottom: 8px; }
  .reasons-wrap { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
  .rtag {
    padding: 6px 12px; border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .rtag:hover { border-color: var(--border2); color: var(--text); }
  .rtag.on { border-color: var(--red); background: var(--red-bg); color: var(--red); }

  /* CTA */
  .cta-btn {
    width: 100%; padding: 12px;
    background: var(--red);
    border: none; border-radius: 8px;
    color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: opacity 0.15s;
    letter-spacing: -0.2px;
  }
  .cta-btn:hover { opacity: 0.9; }
  .cta-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .cta-btn.loading::after { content: '...'; }

  .err {
    font-size: 13px; color: var(--red);
    background: var(--red-bg); border: 1px solid var(--red-border);
    border-radius: 7px; padding: 8px 12px; margin-bottom: 12px;
  }

  /* Output */
  #output { display: none; }

  .out-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  .sec-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted2);
    margin-bottom: 12px; font-family: 'DM Mono', monospace;
  }

  /* Assessment */
  .assess-row { display: flex; align-items: flex-start; gap: 1.5rem; margin-bottom: 12px; }
  .win-block { flex-shrink: 0; }
  .win-pct { font-size: 48px; font-weight: 600; line-height: 1; letter-spacing: -2px; }
  .win-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .assess-text { font-size: 14px; color: var(--muted); line-height: 1.7; padding-top: 4px; }
  .urgency-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 500; padding: 3px 10px;
    border-radius: 5px; margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }
  .urg-high { background: #1a0a0a; border: 1px solid #3a1a1a; color: var(--red); }
  .urg-med { background: var(--amber-bg); border: 1px solid #3a2a00; color: var(--amber); }
  .urg-low { background: var(--green-bg); border: 1px solid #0a2a1a; color: var(--green); }

  /* Kill shot */
  .kill-card {
    background: var(--red-bg);
    border: 1px solid var(--red-border);
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .kill-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--red); margin-bottom: 10px; font-family: 'DM Mono', monospace; }
  .kill-text { font-size: 16px; font-weight: 500; line-height: 1.6; font-style: italic; color: var(--text); }

  /* Counter moves */
  .move { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .move:last-child { border-bottom: none; padding-bottom: 0; }
  .move:first-of-type { padding-top: 0; }
  .move-n {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: var(--muted);
    flex-shrink: 0; margin-top: 1px; font-family: 'DM Mono', monospace;
  }
  .move-body { flex: 1; }
  .move-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 4px; }
  .move-title { font-size: 14px; font-weight: 600; }
  .move-time {
    font-size: 11px; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 4px; white-space: nowrap;
    font-family: 'DM Mono', monospace;
  }
  .move-action { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* Talk track */
  .tt-opening {
    background: var(--surface2); border-radius: 8px;
    padding: 10px 14px; font-size: 14px; line-height: 1.7;
    margin-bottom: 14px; border-left: 3px solid var(--border2);
  }
  .tt-sublabel { font-size: 11px; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; font-family: 'DM Mono', monospace; }
  .key-msg { display: flex; gap: 8px; font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
  .check { color: var(--green); flex-shrink: 0; margin-top: 3px; font-size: 13px; }
  .obj-item { margin-bottom: 10px; }
  .obj-q {
    font-size: 12px; color: var(--amber);
    font-style: italic; margin-bottom: 4px;
    padding-left: 10px; border-left: 2px solid var(--amber);
  }
  .obj-a { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* Email */
  .email-wrap { background: var(--surface2); border-radius: 10px; padding: 14px 16px; }
  .email-from { font-size: 12px; color: var(--muted2); margin-bottom: 4px; font-family: 'DM Mono', monospace; }
  .email-subj { font-size: 14px; font-weight: 600; padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .email-body { font-size: 13px; color: var(--muted); line-height: 1.8; white-space: pre-line; }

  /* Actions */
  .actions-row { display: flex; gap: 10px; margin-top: 1rem; }
  .act-btn {
    flex: 1; padding: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .act-btn:hover { border-color: var(--border2); color: var(--text); }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

  @media (max-width: 520px) {
    .grid2 { grid-template-columns: 1fr; }
    .assess-row { flex-direction: column; gap: 8px; }
    .actions-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="logo-row">
      <div class="logo-mark">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2L14 13H2L8 2Z" fill="white"/>
        </svg>
      </div>
      <span class="logo-name">FlipIt</span>
      <span class="logo-tag">beta</span>
    </div>
    <p class="header-sub">Turn losing deals into wins — competitive rescue plan in 60 seconds.</p>
  </div>

  <!-- Form -->
  <div class="form-card">
    <div class="grid2">
      <div class="field">
        <label>Your product *</label>
        <input type="text" id="product" placeholder="e.g. Keka HR" />
      </div>
      <div class="field">
        <label>Competitor *</label>
        <input type="text" id="competitor" placeholder="e.g. Darwinbox" />
      </div>
    </div>
    <div class="grid2">
      <div class="field">
        <label>Deal stage *</label>
        <select id="stage">
          <option value="">Select stage</option>
          <option>Qualification</option>
          <option>Discovery</option>
          <option>Demo / Evaluation</option>
          <option>Proposal</option>
          <option>Negotiation</option>
          <option>Final Decision</option>
        </select>
      </div>
      <div class="field">
        <label>Industry</label>
        <input type="text" id="industry" placeholder="e.g. Financial Services" />
      </div>
    </div>

    <div style="margin-bottom:14px">
      <div class="reasons-label">Why are you losing? * (select all that apply)</div>
      <div class="reasons-wrap" id="reasons-wrap">
        <button class="rtag" data-id="late">Entered deal late</button>
        <button class="rtag" data-id="price">Pricing is higher</button>
        <button class="rtag" data-id="discount">Limited discounts</button>
        <button class="rtag" data-id="partner">Partner pushing competitor</button>
        <button class="rtag" data-id="delivery">Slower delivery</button>
        <button class="rtag" data-id="features">Competitor has better features</button>
        <button class="rtag" data-id="incumbent">Competitor is incumbent</button>
        <button class="rtag" data-id="relationship">Weaker exec relationship</button>
      </div>
    </div>

    <div class="field" style="margin-bottom:16px">
      <label>Additional context <span style="font-weight:400;color:#555">(optional)</span></label>
      <textarea id="context" rows="2" placeholder="Deal value, account size, key stakeholders, recent interactions..."></textarea>
    </div>

    <div id="err" class="err" style="display:none"></div>
    <button class="cta-btn" id="flipBtn" onclick="handleFlip()">Flip this deal →</button>
  </div>

  <!-- Output -->
  <div id="output"></div>

</div>

<script>
const selected = new Set();
const reasonLabels = {
  late: 'Entered the deal late',
  price: 'Pricing is higher than competitor',
  discount: 'Limited discount flexibility',
  partner: 'Partner is pushing competitor',
  delivery: 'Slower product delivery / roadmap',
  features: 'Competitor has better features',
  incumbent: 'Competitor is the incumbent',
  relationship: 'Weaker executive relationship'
};

document.querySelectorAll('.rtag').forEach(btn => {
  btn.onclick = () => {
    const id = btn.dataset.id;
    if (selected.has(id)) { selected.delete(id); btn.classList.remove('on'); }
    else { selected.add(id); btn.classList.add('on'); }
  };
});

async function handleFlip() {
  const product = document.getElementById('product').value.trim();
  const competitor = document.getElementById('competitor').value.trim();
  const stage = document.getElementById('stage').value;
  const industry = document.getElementById('industry').value.trim();
  const context = document.getElementById('context').value.trim();
  const errEl = document.getElementById('err');

  if (!product || !competitor || !stage || selected.size === 0) {
    errEl.textContent = 'Please fill in product, competitor, deal stage and select at least one reason.';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  const reasons = [...selected].map(id => reasonLabels[id]).join('; ');
  const btn = document.getElementById('flipBtn');
  btn.disabled = true;
  btn.textContent = 'Generating rescue plan...';
  document.getElementById('output').innerHTML = '';

  try {
    const res = await fetch('/api/rescue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product, competitor, stage, industry, reasons, context })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderOutput(data, product, competitor);
  } catch(e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Flip this deal →';
  }
}

function urgClass(u) {
  if (!u) return 'urg-med';
  const v = u.toLowerCase();
  return v === 'high' ? 'urg-high' : v === 'low' ? 'urg-low' : 'urg-med';
}

function winColor(p) {
  return p >= 60 ? '#30a46c' : p >= 35 ? '#e5a00d' : '#e5484d';
}

function renderOutput(d, product, competitor) {
  const a = d.dealAssessment;
  const wp = Number(a.winProbability);

  const movesHTML = (d.counterMoves || []).map((m, i) => `
    <div class="move">
      <div class="move-n">${i+1}</div>
      <div class="move-body">
        <div class="move-head">
          <span class="move-title">${m.move}</span>
          <span class="move-time">${m.timing}</span>
        </div>
        <div class="move-action">${m.action}</div>
      </div>
    </div>`).join('');

  const msgsHTML = (d.talkTrack.keyMessages || []).map(msg =>
    `<div class="key-msg"><span class="check">✓</span><span>${msg}</span></div>`).join('');

  const objHTML = (d.talkTrack.objectionHandlers || []).map(oh => `
    <div class="obj-item">
      <div class="obj-q">"${oh.objection}"</div>
      <div class="obj-a">${oh.response}</div>
    </div>`).join('');

  const fullOutput = `
    <div class="out-section">
      <div class="sec-label">Deal assessment — ${product} vs ${competitor}</div>
      <div class="assess-row">
        <div class="win-block">
          <div class="win-pct" style="color:${winColor(wp)}">${wp}%</div>
          <div class="win-sub">win probability</div>
        </div>
        <div>
          <div class="urgency-badge ${urgClass(a.urgency)}">${a.urgency} urgency</div>
          <div class="assess-text">${a.summary}</div>
        </div>
      </div>
    </div>

    <div class="kill-card">
      <div class="kill-label">The kill shot</div>
      <div class="kill-text">"${d.killShot}"</div>
    </div>

    <div class="out-section">
      <div class="sec-label">Counter-moves</div>
      ${movesHTML}
    </div>

    <div class="out-section">
      <div class="sec-label">Talk track</div>
      <div class="tt-sublabel">Opening line</div>
      <div class="tt-opening">${d.talkTrack.opening}</div>
      <div class="tt-sublabel">Key messages</div>
      <div style="margin-bottom:14px">${msgsHTML}</div>
      <div class="tt-sublabel">Objection handlers</div>
      ${objHTML}
    </div>

    <div class="out-section">
      <div class="sec-label">Email template</div>
      <div class="email-wrap">
        <div class="email-from">To: [Prospect Name]</div>
        <div class="email-subj">${d.emailTemplate.subject}</div>
        <div class="email-body">${d.emailTemplate.body}</div>
      </div>
    </div>

    <div class="actions-row">
      <button class="act-btn" onclick="copyAll()">Copy full rescue plan</button>
      <button class="act-btn" onclick="copyEmail()">Copy email only</button>
      <button class="act-btn" onclick="document.getElementById('output').innerHTML='';window.scrollTo(0,0)">New deal</button>
    </div>`;

  const outEl = document.getElementById('output');
  outEl.innerHTML = fullOutput;
  outEl.style.display = 'block';
  outEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

  window._lastData = d;
}

function copyAll() {
  const d = window._lastData;
  if (!d) return;
  const moves = (d.counterMoves || []).map((m,i) => `${i+1}. ${m.move} (${m.timing})\n   ${m.action}`).join('\n\n');
  const msgs = (d.talkTrack.keyMessages || []).map(m => `• ${m}`).join('\n');
  const objs = (d.talkTrack.objectionHandlers || []).map(o => `Q: "${o.objection}"\nA: ${o.response}`).join('\n\n');
  const text = `FLIPIT DEAL RESCUE PLAN
=======================
Win Probability: ${d.dealAssessment.winProbability}% | Urgency: ${d.dealAssessment.urgency}
${d.dealAssessment.summary}

THE KILL SHOT
"${d.killShot}"

COUNTER-MOVES
${moves}

TALK TRACK
Opening: ${d.talkTrack.opening}

Key Messages:
${msgs}

Objection Handlers:
${objs}

EMAIL
Subject: ${d.emailTemplate.subject}

${d.emailTemplate.body}`;

  navigator.clipboard.writeText(text).then(() => alert('Rescue plan copied to clipboard!'));
}

function copyEmail() {
  const d = window._lastData;
  if (!d) return;
  const text = `Subject: ${d.emailTemplate.subject}\n\n${d.emailTemplate.body}`;
  navigator.clipboard.writeText(text).then(() => alert('Email copied to clipboard!'));
}
</script>
</body>
</html>
